syntax = "proto3";

package api.user.v1;

import "google/api/annotations.proto";
import "api/user/v1/user.proto";

option go_package = "github.com/topcms/kratos-template/api/user/v1;v1";

// UserService 用户领域 gRPC / HTTP 接口（HTTP 映射见各 rpc 的 google.api.http）。
service UserService {
  // 单个获取
  rpc GetUser(ReqUserDetail) returns (RspUserDetail) {
    option (google.api.http) = {
      get: "/v1/user/detail"
    };
  }

  // 新增
  rpc CreateUser(ReqUserCreate) returns (RspUserCreate) {
    option (google.api.http) = {
      post: "/v1/user/create"
      body: "*"
    };
  }

  // 更新
  rpc UpdateUser(ReqUserUpdate) returns (RspUserUpdate) {
    option (google.api.http) = {
      put: "/v1/user/update"
      body: "*"
    };
  }

  // 列表获取
  rpc ListUser(ReqUserList) returns (RspUserList) {
    option (google.api.http) = {
      get: "/v1/user/list"
    };
  }
}
