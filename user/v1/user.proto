syntax = "proto3";

package api.user.v1;

import "api/common/v1/common.proto";

option go_package = "github.com/topcms/api-contracts/gen/go/api/user/v1;v1";

// User 为用户领域核心实体。
message User {
  int64 id = 1;
  string name = 2;
  string avatar = 3;
}

message GetUserRequest {
  api.common.v1.Metadata metadata = 1;
  int64 id = 2;
}

message GetUserResponse {
  api.common.v1.Reply meta = 1;
  User user = 2;
}
