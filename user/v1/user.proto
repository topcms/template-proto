syntax = "proto3";

package api.user.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/topcms/kratos-template/api/user/v1;v1";

// UserInfo 为用户信息实体。
message UserInfo {
  int64  user_id           = 1;
  string user_code         = 2;
  string user_name         = 3;
  string avatar            = 4;
  int32  gender            = 5;
  string introduction      = 6;
  int32 reg_type           = 7;
  google.protobuf.Timestamp reg_time   = 8;
  int32  reg_ip            = 9;
  string country           = 10;
  string province          = 11;
  string city              = 12;
  string lang              = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
  int32  is_del            = 16;
}

// UserList 为用户列表数据结构。
message UserList {
  repeated UserInfo list  = 1;
  int64             total = 2;
}

// ReqUserDetail 单个用户查询请求。
message ReqUserDetail {
  int64 id = 1;
}

// RspUserDetail 单个用户查询响应。
message RspUserDetail {
  UserInfo user = 1;
}

// ReqUserCreate 用户新增请求。
message ReqUserCreate {
  UserInfo user = 1;
}

// RspUserCreate 用户新增响应。
message RspUserCreate {
  UserInfo user = 1;
}

// ReqUserUpdate 用户更新请求。
message ReqUserUpdate {
  int64 user_id = 1;
  optional string user_code = 2;
  optional string user_name = 3;
  optional string avatar = 4;
  optional int32 gender = 5;
  optional string introduction = 6;
  optional int32 reg_type = 7;
  google.protobuf.Timestamp reg_time = 8;
  optional int32 reg_ip = 9;
  optional string country = 10;
  optional string province = 11;
  optional string city = 12;
  optional string lang = 13;
  optional int32 is_del = 14;
}

// RspUserUpdate 用户更新响应。
message RspUserUpdate {
  UserInfo user = 1;
}

// ReqUserList 用户列表查询请求。
message ReqUserList {
  int64 page = 1;
  int64 size = 2;
}

// RspUserList 用户列表查询响应。
message RspUserList {
  int64             total = 1;
  repeated UserInfo list  = 2;
}
